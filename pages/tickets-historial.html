<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Historial Tickets — Pioneer Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .priority-badge { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600; }
    .priority-Baja     { background:#f0fdf4;color:#15803d; }
    .priority-Media    { background:#fefce8;color:#a16207; }
    .priority-Alta     { background:#fff7ed;color:#c2410c; }
    .priority-Crítica  { background:#fef2f2;color:#b91c1c; }
    .status-badge { display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600; }
    .status-Abierto    { background:#dbeafe;color:#1d4ed8; }
    .status-En\ progreso { background:#fef9c3;color:#a16207; }
    .status-Resuelto   { background:#dcfce7;color:#15803d; }
    .status-Cerrado    { background:#f3f4f6;color:#6b7280; }
    .filter-btn { padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border-strong);background:white;color:var(--text-secondary);transition:all 0.2s; }
    .filter-btn.active { background:var(--purple);color:white;border-color:var(--purple); }
    .comment-item { padding:12px 14px;background:#f9f9f9;border-radius:10px;margin-bottom:10px; }
    .comment-author { font-size:12px;font-weight:700;color:var(--purple);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between; }
    .comment-text { font-size:13px;color:#333;line-height:1.6; }
    .comment-time { font-size:10px;color:var(--gray);font-weight:400; }
    .assign-select { padding:8px 12px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:12px;width:100%; }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--purple);position:sticky;top:0;z-index:200">
    <button id="mobile-menu-btn" style="color:white;font-size:22px;background:none;border:none;cursor:pointer;">☰</button>
    <span style="color:white;font-weight:700">Pioneer Portal</span>
  </div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-inner">
        <div class="breadcrumb"><span>Tickets</span><span>/</span><span class="active">Historial</span></div>
        <div class="page-header">
          <div>
            <h1 class="page-title">Historial de Tickets</h1>
            <p class="page-subtitle" id="total-label">Cargando...</p>
          </div>
          <a href="ticket-nuevo.html" class="btn btn-primary">🎫 Crear Ticket</a>
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px" id="filter-btns">
          <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
          <button class="filter-btn" onclick="setFilter('Abierto', this)">🔵 Abiertos</button>
          <button class="filter-btn" onclick="setFilter('En progreso', this)">🟡 En progreso</button>
          <button class="filter-btn" onclick="setFilter('Resuelto', this)">🟢 Resueltos</button>
          <button class="filter-btn" onclick="setFilter('Cerrado', this)">⚫ Cerrados</button>
        </div>

        <div class="search-bar" style="margin-bottom:16px">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="form-input" placeholder="Buscar por asunto, categoría o número..." style="padding-left:40px"/>
        </div>

        <div class="card" style="overflow:hidden">
          <div class="table-wrap">
            <table class="pioneer-table">
              <thead>
                <tr>
                  <th>N° Ticket</th><th>Asunto</th><th>Categoría</th><th>Prioridad</th>
                  <th>Estado</th><th>Asignado a</th><th>Creado por</th><th>Fecha</th><th>Acciones</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr><td colspan="9" style="text-align:center;padding:40px">
                  <div class="spinner spinner-purple" style="width:28px;height:28px;margin:0 auto"></div>
                </td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination" id="pagination" style="display:none">
            <span id="pagination-info"></span>
            <div class="pagination-btns">
              <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="changePage(-1)">← Anterior</button>
              <button class="btn btn-primary btn-sm" id="btn-next" onclick="changePage(1)">Siguiente →</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- View Ticket Modal (full detail with comments + assignment) -->
  <div id="ticket-modal" class="modal-overlay hidden">
    <div class="modal" style="max-width:680px">
      <div class="modal-header">
        <div>
          <p class="modal-title" id="modal-ticket-num">TKT-2025-00001</p>
          <p class="modal-subtitle" id="modal-asunto">Asunto del ticket</p>
        </div>
        <button class="modal-close" onclick="closeTicketModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body" style="max-height:75vh;overflow-y:auto"></div>
    </div>
  </div>

  <script src="../js/load-libs.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    const PAGE_SIZE = 15
    let page = 0, total = 0, searchTerm = '', statusFilter = 'todos'
    let currentUser = null
    let allUsers = []
    let currentTicketData = null

    async function init() {
      currentUser = await Auth.requireAuth()
      if (!currentUser) return
      renderSidebar('tickets-historial.html', currentUser)
      initMobileSidebar()

      // Load users list for assignment dropdown
      const { data: users } = await Auth.supabase.from('users').select('id,name,email').eq('is_active', true).order('name')
      allUsers = users || []

      loadData()

      let timer
      document.getElementById('search-input').addEventListener('input', e => {
        clearTimeout(timer)
        timer = setTimeout(() => { searchTerm = e.target.value.trim(); page = 0; loadData() }, 350)
      })
    }

    function setFilter(status, btn) {
      statusFilter = status
      page = 0
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      loadData()
    }

    async function loadData() {
      document.getElementById('table-body').innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px">
        <div class="spinner spinner-purple" style="width:28px;height:28px;margin:0 auto"></div></td></tr>`

      let query = Auth.supabase.from('tickets')
        .select('*', { count: 'exact' })
        .order('created_at', { ascending: false })
        .range(page * PAGE_SIZE, (page + 1) * PAGE_SIZE - 1)

      if (statusFilter !== 'todos') query = query.eq('status', statusFilter)
      if (searchTerm) query = query.or(`asunto.ilike.%${searchTerm}%,ticket_num.ilike.%${searchTerm}%,categoria.ilike.%${searchTerm}%,created_by_name.ilike.%${searchTerm}%`)
      if (!Auth.isAdmin()) query = query.or(`created_by_id.eq.${currentUser.id},assigned_to_id.eq.${currentUser.id}`)

      const { data, count, error } = await query
      if (error) { toast('Error cargando tickets', 'error'); return }

      total = count || 0
      document.getElementById('total-label').textContent = `${total} ticket${total !== 1 ? 's' : ''} encontrado${total !== 1 ? 's' : ''}`
      document.getElementById('table-body').innerHTML = renderRows(data || [])

      const totalPages = Math.ceil(total / PAGE_SIZE)
      const pag = document.getElementById('pagination')
      if (totalPages > 1) {
        pag.style.display = 'flex'
        document.getElementById('pagination-info').textContent = `Página ${page+1} de ${totalPages}`
        document.getElementById('btn-prev').style.display = page === 0 ? 'none' : ''
        document.getElementById('btn-next').style.display = page >= totalPages - 1 ? 'none' : ''
      } else { pag.style.display = 'none' }
    }

    function renderRows(rows) {
      if (!rows.length) return `<tr><td colspan="9">
        <div class="empty-state"><span>🎫</span>
          <p>${searchTerm || statusFilter !== 'todos' ? 'Sin resultados para ese filtro' : 'No hay tickets registrados aún'}</p>
        </div></td></tr>`

      return rows.map(t => `<tr>
          <td><span style="font-family:monospace;font-size:11px;background:#f8f8f8;padding:3px 8px;border-radius:6px;border:1px solid #eee;font-weight:600">${t.ticket_num}</span></td>
          <td>
            <p style="font-weight:600;font-size:13px;color:#111;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.asunto}</p>
            <p style="font-size:11px;color:var(--gray)">${t.tipo || 'Incidente'}</p>
          </td>
          <td><span style="font-size:12px;color:#555">${t.categoria}</span></td>
          <td><span class="priority-badge priority-${t.prioridad}">${t.prioridad}</span></td>
          <td><span class="status-badge status-${t.status}">${t.status}</span></td>
          <td>
            ${t.assigned_to_name
              ? `<p style="font-size:12px;font-weight:600;color:#333">${t.assigned_to_name}</p>`
              : '<span style="font-size:11px;color:#ccc">Sin asignar</span>'}
          </td>
          <td>
            <p style="font-size:12px;font-weight:600;color:#333">${t.created_by_name}</p>
            <p style="font-size:10px;color:var(--gray)">${t.created_by_email}</p>
          </td>
          <td>
            <p style="font-size:12px;color:#555">${fmtDate(t.created_at)}</p>
            <p style="font-size:10px;color:var(--gray)">${timeAgo(t.created_at)}</p>
          </td>
          <td>
            <button onclick="viewTicket('${t.id}')" title="Ver detalle"
              style="padding:5px 10px;border-radius:7px;font-size:11px;background:var(--purple-pale);color:var(--purple);border:none;cursor:pointer;font-weight:600">
              Ver / Gestionar
            </button>
          </td>
        </tr>`).join('')
    }

    async function viewTicket(id) {
      const { data: t } = await Auth.supabase.from('tickets').select('*').eq('id', id).single()
      if (!t) return
      currentTicketData = t

      document.getElementById('modal-ticket-num').textContent = t.ticket_num
      document.getElementById('modal-asunto').textContent = t.asunto

      const canManage = Auth.isAdmin()

      document.getElementById('modal-body').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
          <div><p style="font-size:11px;color:var(--gray);margin-bottom:4px">ESTADO</p>
            <span class="status-badge status-${t.status}">${t.status}</span></div>
          <div><p style="font-size:11px;color:var(--gray);margin-bottom:4px">PRIORIDAD</p>
            <span class="priority-badge priority-${t.prioridad}">${t.prioridad}</span></div>
          <div><p style="font-size:11px;color:var(--gray);margin-bottom:4px">CATEGORÍA</p>
            <p style="font-size:13px;font-weight:600">${t.categoria}</p></div>
          <div><p style="font-size:11px;color:var(--gray);margin-bottom:4px">TIPO</p>
            <p style="font-size:13px;font-weight:600">${t.tipo || '—'}</p></div>
          <div><p style="font-size:11px;color:var(--gray);margin-bottom:4px">CREADO POR</p>
            <p style="font-size:13px;font-weight:600">${t.created_by_name}</p>
            <p style="font-size:11px;color:var(--gray)">${t.created_by_email}</p></div>
          <div><p style="font-size:11px;color:var(--gray);margin-bottom:4px">FECHA</p>
            <p style="font-size:13px;font-weight:600">${fmtDate(t.created_at)}</p></div>
          ${t.servicio_afectado ? `<div><p style="font-size:11px;color:var(--gray);margin-bottom:4px">SERVICIO AFECTADO</p><p style="font-size:13px;font-weight:600">${t.servicio_afectado}</p></div>` : ''}
          ${t.usuarios_afectados ? `<div><p style="font-size:11px;color:var(--gray);margin-bottom:4px">USUARIOS AFECTADOS</p><p style="font-size:13px;font-weight:600">${t.usuarios_afectados}</p></div>` : ''}
        </div>

        <div style="background:#f9f9f9;border-radius:10px;padding:16px;margin-bottom:14px">
          <p style="font-size:11px;color:var(--gray);margin-bottom:8px;font-weight:600">DESCRIPCIÓN</p>
          <p style="font-size:13px;color:#333;line-height:1.6">${t.descripcion}</p>
        </div>
        ${t.pasos_previos ? `<div style="background:#f9f9f9;border-radius:10px;padding:16px;margin-bottom:14px">
          <p style="font-size:11px;color:var(--gray);margin-bottom:8px;font-weight:600">PASOS PREVIOS</p>
          <p style="font-size:13px;color:#333;line-height:1.6">${t.pasos_previos}</p></div>` : ''}
        ${t.observaciones ? `<div style="background:#f9f9f9;border-radius:10px;padding:16px;margin-bottom:14px">
          <p style="font-size:11px;color:var(--gray);margin-bottom:8px;font-weight:600">OBSERVACIONES</p>
          <p style="font-size:13px;color:#333;line-height:1.6">${t.observaciones}</p></div>` : ''}
        ${t.resolucion ? `<div style="background:#dcfce7;border-radius:10px;padding:16px;margin-bottom:14px">
          <p style="font-size:11px;color:#15803d;margin-bottom:8px;font-weight:600">✅ RESOLUCIÓN</p>
          <p style="font-size:13px;color:#166534;line-height:1.6">${t.resolucion}</p></div>` : ''}

        ${t.adjuntos && t.adjuntos.length ? `<div style="margin-bottom:14px">
          <p style="font-size:11px;color:var(--gray);margin-bottom:8px;font-weight:600">📎 ARCHIVOS ADJUNTOS (${t.adjuntos.length})</p>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${t.adjuntos.map(f => `
              <a href="${f.url}" target="_blank" style="display:flex;align-items:center;gap:10px;background:#f8f8f8;border:1px solid #eee;border-radius:8px;padding:10px 14px;text-decoration:none;color:#111">
                <span style="font-size:18px">${getFileIconHistorial(f.name)}</span>
                <span style="font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span>
                <span style="font-size:11px;color:var(--gray)">${formatFileSizeHistorial(f.size)}</span>
                <span style="font-size:11px;color:var(--purple)">⬇ Descargar</span>
              </a>`).join('')}
          </div>
        </div>` : ''}

        <!-- ASIGNACIÓN (solo admin) -->
        ${canManage ? `
        <div style="background:var(--purple-pale);border-radius:10px;padding:16px;margin-bottom:14px">
          <p style="font-size:11px;color:var(--purple);margin-bottom:8px;font-weight:700">👤 ASIGNAR A</p>
          <div style="display:flex;gap:8px">
            <select id="assign-select" class="assign-select">
              <option value="">Sin asignar</option>
              ${allUsers.map(u => `<option value="${u.id}|${u.name}|${u.email}" ${t.assigned_to_id===u.id?'selected':''}>${u.name} (${u.email})</option>`).join('')}
            </select>
            <button class="btn btn-primary btn-sm" onclick="assignTicket('${t.id}')">Asignar</button>
          </div>
        </div>

        <!-- CAMBIAR ESTADO (solo admin) -->
        <div style="background:#f3f4f6;border-radius:10px;padding:16px;margin-bottom:14px">
          <p style="font-size:11px;color:#374151;margin-bottom:8px;font-weight:700">🔄 CAMBIAR ESTADO</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <select id="status-select" class="assign-select" style="flex:1;min-width:140px">
              <option value="Abierto" ${t.status==='Abierto'?'selected':''}>🔵 Abierto</option>
              <option value="En progreso" ${t.status==='En progreso'?'selected':''}>🟡 En progreso</option>
              <option value="Resuelto" ${t.status==='Resuelto'?'selected':''}>🟢 Resuelto</option>
              <option value="Cerrado" ${t.status==='Cerrado'?'selected':''}>⚫ Cerrado</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="updateStatusInModal('${t.id}')">Actualizar</button>
          </div>
          <textarea id="resolucion-input" class="form-textarea" rows="2" placeholder="Nota de resolución (opcional)..." style="margin-top:8px;font-size:12px">${t.resolucion||''}</textarea>
        </div>` : t.assigned_to_name ? `
        <div style="background:var(--purple-pale);border-radius:10px;padding:14px;margin-bottom:14px">
          <p style="font-size:11px;color:var(--purple);font-weight:700">👤 ASIGNADO A: ${t.assigned_to_name}</p>
        </div>` : ''}

        <!-- COMENTARIOS -->
        <div style="border-top:1px solid #eee;padding-top:16px;margin-top:8px">
          <p style="font-size:12px;font-weight:700;color:#111;margin-bottom:12px">💬 Comentarios y Seguimiento</p>
          <div id="comments-list" style="margin-bottom:14px">
            <div style="text-align:center;padding:16px"><div class="spinner spinner-purple" style="width:20px;height:20px;margin:0 auto"></div></div>
          </div>
          <div style="display:flex;gap:8px">
            <textarea id="new-comment" class="form-textarea" rows="2" placeholder="Escribe un comentario o pregunta..." style="flex:1;font-size:13px"></textarea>
            <button class="btn btn-primary" onclick="addComment('${t.id}')" style="align-self:flex-end">Enviar</button>
          </div>
        </div>
      `

      document.getElementById('ticket-modal').classList.remove('hidden')
      loadComments(t.id)
    }

    async function loadComments(ticketId) {
      const { data: comments } = await Auth.supabase
        .from('ticket_comments').select('*').eq('ticket_id', ticketId)
        .order('created_at', { ascending: true })

      const list = document.getElementById('comments-list')
      if (!list) return

      if (!comments || !comments.length) {
        list.innerHTML = `<p style="font-size:12px;color:#ccc;text-align:center;padding:12px">Sin comentarios aún. Sé el primero en comentar.</p>`
        return
      }

      list.innerHTML = comments.map(c => `
        <div class="comment-item">
          <div class="comment-author">
            <span>${c.created_by_name}</span>
            <span class="comment-time">${timeAgo(c.created_at)}</span>
          </div>
          <div class="comment-text">${c.comment}</div>
        </div>`).join('')
    }

    async function addComment(ticketId) {
      const textarea = document.getElementById('new-comment')
      const text = textarea.value.trim()
      if (!text) return

      const { error } = await Auth.supabase.from('ticket_comments').insert([{
        ticket_id: ticketId,
        comment: text,
        created_by_id: currentUser.id,
        created_by_name: currentUser.name,
        created_by_email: currentUser.email,
      }])

      if (error) { toast('Error al comentar: ' + error.message, 'error'); return }

      await Auth.supabase.from('audit_logs').insert([{
        user_id: currentUser.id, action: 'ADD_COMMENT', entity: 'Ticket', entity_id: ticketId,
      }])

      // Send notification (non-blocking)
      if (currentTicketData) {
        PioneerNotify.sendNewComment(currentTicketData, text, currentUser).catch(()=>{})
      }

      textarea.value = ''
      loadComments(ticketId)
      toast('Comentario agregado', 'success')
    }

    async function assignTicket(ticketId) {
      const select = document.getElementById('assign-select')
      const val = select.value

      let updateData = { assigned_to_id: null, assigned_to_name: null, assigned_to_email: null }
      let assignedUser = null

      if (val) {
        const [id, name, email] = val.split('|')
        updateData = { assigned_to_id: id, assigned_to_name: name, assigned_to_email: email }
        assignedUser = { id, name, email }
      }

      const { error } = await Auth.supabase.from('tickets').update(updateData).eq('id', ticketId)
      if (error) { toast('Error: ' + error.message, 'error'); return }

      await Auth.supabase.from('audit_logs').insert([{
        user_id: currentUser.id, action: 'ASSIGN_TICKET', entity: 'Ticket', entity_id: ticketId,
        details: JSON.stringify(updateData),
      }])

      if (assignedUser && currentTicketData) {
        PioneerNotify.sendAssigned(currentTicketData, assignedUser, currentUser).catch(()=>{})
      }

      toast(assignedUser ? `Ticket asignado a ${assignedUser.name}` : 'Asignación removida', 'success')
      closeTicketModal()
      loadData()
    }

    async function updateStatusInModal(ticketId) {
      const newStatus = document.getElementById('status-select').value
      const resolucion = document.getElementById('resolucion-input').value.trim() || null
      const oldStatus = currentTicketData?.status

      const updateData = { status: newStatus }
      if (resolucion) updateData.resolucion = resolucion

      const { error } = await Auth.supabase.from('tickets').update(updateData).eq('id', ticketId)
      if (error) { toast('Error: ' + error.message, 'error'); return }

      await Auth.supabase.from('audit_logs').insert([{
        user_id: currentUser.id, action: 'UPDATE_TICKET_STATUS', entity: 'Ticket', entity_id: ticketId,
        details: JSON.stringify({ oldStatus, newStatus }),
      }])

      if (currentTicketData && oldStatus !== newStatus) {
        PioneerNotify.sendStatusChanged(currentTicketData, oldStatus, newStatus, currentUser).catch(()=>{})
      }

      toast(`Estado actualizado a "${newStatus}"`, 'success')
      closeTicketModal()
      loadData()
    }

    function closeTicketModal() {
      document.getElementById('ticket-modal').classList.add('hidden')
      currentTicketData = null
    }

    function getFileIconHistorial(filename) {
      const ext = filename.split('.').pop().toLowerCase()
      const icons = { pdf:'📕', doc:'📘', docx:'📘', xls:'📗', xlsx:'📗', csv:'📊', txt:'📄', png:'🖼️', jpg:'🖼️', jpeg:'🖼️', zip:'🗜️' }
      return icons[ext] || '📎'
    }
    function formatFileSizeHistorial(bytes) {
      if (!bytes) return ''
      if (bytes < 1024) return bytes + ' B'
      if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB'
      return (bytes/(1024*1024)).toFixed(1) + ' MB'
    }

    document.getElementById('ticket-modal').addEventListener('click', function(e) {
      if (e.target === this) closeTicketModal()
    })

    function changePage(dir) { page = Math.max(0, page + dir); loadData() }
    init()
  </script>
</body>
</html>
