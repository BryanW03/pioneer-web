<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Pioneer Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div id="toast-container"></div>

  <!-- Mobile header -->
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--purple);position:sticky;top:0;z-index:200" class="mobile-header">
    <button id="mobile-menu-btn" style="color:white;font-size:22px;line-height:1;">☰</button>
    <span style="color:white;font-weight:700;font-size:15px">Pioneer Portal</span>
  </div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div class="page-inner" id="page-content">
        <!-- Loaded dynamically -->
        <div style="display:flex;align-items:center;justify-content:center;height:200px">
          <div class="spinner spinner-purple" style="width:36px;height:36px"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/msal.js/2.38.3/msal-browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/supabase/2.39.3/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    async function init() {
      const user = await Auth.requireAuth()
      if (!user) return

      renderSidebar('dashboard.html', user)
      initMobileSidebar()

      const sb = Auth.supabase
      const isAdmin = Auth.isAdmin()

      // Load stats
      const [
        { count: totalTerceros },
        { count: totalUsers },
        { data: recentTerceros },
        { data: recentLogs },
      ] = await Promise.all([
        sb.from('terceros').select('*', { count: 'exact', head: true }),
        isAdmin ? sb.from('users').select('*', { count: 'exact', head: true }).eq('is_active', true) : Promise.resolve({ count: 0 }),
        sb.from('terceros').select('*').order('created_at', { ascending: false }).limit(5),
        sb.from('audit_logs').select('*, users(name,email)').order('created_at', { ascending: false }).limit(8),
      ])

      const hour = new Date().getHours()
      const greeting = hour < 12 ? 'Buenos días' : hour < 18 ? 'Buenas tardes' : 'Buenas noches'
      const firstName = user.name.split(' ')[0]

      const monthTerceros = (recentTerceros || []).filter(t =>
        new Date(t.created_at).getMonth() === new Date().getMonth()
      ).length

      document.getElementById('page-content').innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">${greeting}, ${firstName} 👋</h1>
            <p class="page-subtitle">${new Date().toLocaleDateString('es-DO', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}</p>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
          <div class="card stat-card">
            <div class="stat-icon" style="background:var(--purple-pale)">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="var(--purple)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="stat-value">${totalTerceros || 0}</div>
            <div class="stat-label">Total Terceros</div>
          </div>
          ${isAdmin ? `
          <div class="card stat-card">
            <div class="stat-icon" style="background:#eff6ff">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#2563eb" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>
            <div class="stat-value">${totalUsers || 0}</div>
            <div class="stat-label">Usuarios Activos</div>
          </div>` : ''}
          <div class="card stat-card">
            <div class="stat-icon" style="background:#f0fdf4">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
            </div>
            <div class="stat-value">${monthTerceros}</div>
            <div class="stat-label">Este Mes</div>
          </div>
        </div>

        <!-- Content grid -->
        <div class="grid-2" style="gap:20px;margin-bottom:20px">

          <!-- Recent terceros -->
          <div class="card" style="grid-column: span 1">
            <div class="card-header">
              <span class="card-title">Terceros Recientes</span>
              <a href="terceros-historial.html" class="btn btn-secondary btn-sm">Ver todos</a>
            </div>
            <div>
              ${(recentTerceros || []).length === 0
                ? '<div class="empty-state"><span>📋</span><p>No hay terceros aún</p></div>'
                : (recentTerceros || []).map(t => `
                  <div style="display:flex;align-items:start;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #f9f9f9">
                    <div style="min-width:0">
                      <p style="font-weight:600;font-size:13px;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px">${t.nombre_razon}</p>
                      <p style="font-size:11px;color:var(--gray);margin-top:2px">RNC: ${t.rnc_cedula}</p>
                      <p style="font-size:11px;color:var(--gray)">Por: ${t.created_by_name || '—'}</p>
                    </div>
                    <div style="text-align:right;flex-shrink:0">
                      <span class="badge ${t.status === 'activo' ? 'badge-active' : 'badge-inactive'}">${t.status}</span>
                      <p style="font-size:11px;color:var(--gray);margin-top:4px">${timeAgo(t.created_at)}</p>
                    </div>
                  </div>`).join('')
              }
            </div>
          </div>

          <!-- Activity -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">🕐 Actividad Reciente</span>
            </div>
            <div style="max-height:320px;overflow-y:auto">
              ${(recentLogs || []).length === 0
                ? '<div class="empty-state"><span>📊</span><p>Sin actividad</p></div>'
                : (recentLogs || []).map(log => `
                  <div style="display:flex;gap:10px;padding:12px 20px;border-bottom:1px solid #f9f9f9">
                    <div style="width:6px;height:6px;border-radius:50%;background:var(--purple);margin-top:6px;flex-shrink:0"></div>
                    <div style="min-width:0">
                      <p style="font-size:12px;font-weight:600;color:#333">${getActionLabel(log.action)}</p>
                      <p style="font-size:11px;color:var(--gray)">${log.users?.name || '—'}</p>
                      <p style="font-size:10px;color:#ccc;margin-top:2px">${timeAgo(log.created_at)}</p>
                    </div>
                  </div>`).join('')
              }
            </div>
          </div>

        </div>

        <!-- Quick actions -->
        <div class="grid-2" style="gap:16px">
          <a href="terceros-nuevo.html" class="quick-card">
            <div class="quick-card-icon" style="background:var(--purple-pale)">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="var(--purple)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            </div>
            <div>
              <p class="quick-card-title">Crear Tercero</p>
              <p class="quick-card-sub">Registrar nuevo proveedor o cliente</p>
            </div>
            <span style="margin-left:auto;color:var(--gray);font-size:20px">›</span>
          </a>
          ${isAdmin ? `
          <a href="usuarios.html" class="quick-card">
            <div class="quick-card-icon" style="background:#eff6ff">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#2563eb" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            </div>
            <div>
              <p class="quick-card-title">Gestionar Usuarios</p>
              <p class="quick-card-sub">Crear cuentas y asignar roles</p>
            </div>
            <span style="margin-left:auto;color:var(--gray);font-size:20px">›</span>
          </a>` : ''}
        </div>
      `
    }

    function getActionLabel(a) {
      return { LOGIN:'Inicio de sesión', CREATE_TERCERO:'Tercero creado', EDIT_TERCERO:'Tercero editado',
        CREATE_USER:'Usuario creado', EDIT_USER:'Usuario editado', DEACTIVATE_USER:'Usuario desactivado',
        ACTIVATE_USER:'Usuario activado', CHANGE_ROLE:'Rol modificado' }[a] || a
    }

    init()
  </script>
</body>
</html>
