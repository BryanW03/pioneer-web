<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Pioneer Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div id="toast-container"></div>

  <!-- Mobile header -->
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--purple);position:sticky;top:0;z-index:200">
    <button id="mobile-menu-btn" style="color:white;font-size:22px;line-height:1;background:none;border:none;cursor:pointer;">☰</button>
    <span style="color:white;font-weight:700;font-size:15px">Pioneer Portal</span>
  </div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <!-- Skeleton sidebar -->
      <div class="sidebar-logo">
        <div class="logo-mark" id="sidebar-mark"></div>
        <div class="logo-text"><p>Pioneer</p><span>Investment Funds</span></div>
      </div>
      <div style="padding:12px;color:rgba(255,255,255,0.4);font-size:12px;text-align:center;margin-top:20px">Cargando...</div>
    </aside>

    <main class="main-content">
      <div class="page-inner" id="page-content">

        <!-- Skeleton - shows immediately -->
        <div id="skeleton-header" style="margin-bottom:28px">
          <div style="height:28px;width:260px;background:#eee;border-radius:8px;margin-bottom:8px;animation:pulse 1.5s infinite"></div>
          <div style="height:16px;width:180px;background:#f5f5f5;border-radius:6px;animation:pulse 1.5s infinite"></div>
        </div>

        <div class="stats-grid" id="stats-grid">
          <div class="card stat-card" style="animation:pulse 1.5s infinite">
            <div style="height:40px;width:40px;background:#eee;border-radius:10px;margin-bottom:12px"></div>
            <div style="height:32px;width:60px;background:#eee;border-radius:6px;margin-bottom:8px"></div>
            <div style="height:14px;width:100px;background:#f5f5f5;border-radius:4px"></div>
          </div>
          <div class="card stat-card" style="animation:pulse 1.5s infinite">
            <div style="height:40px;width:40px;background:#eee;border-radius:10px;margin-bottom:12px"></div>
            <div style="height:32px;width:60px;background:#eee;border-radius:6px;margin-bottom:8px"></div>
            <div style="height:14px;width:100px;background:#f5f5f5;border-radius:4px"></div>
          </div>
          <div class="card stat-card" style="animation:pulse 1.5s infinite">
            <div style="height:40px;width:40px;background:#eee;border-radius:10px;margin-bottom:12px"></div>
            <div style="height:32px;width:60px;background:#eee;border-radius:6px;margin-bottom:8px"></div>
            <div style="height:14px;width:100px;background:#f5f5f5;border-radius:4px"></div>
          </div>
        </div>

        <div style="height:300px;background:#eee;border-radius:12px;animation:pulse 1.5s infinite;margin-bottom:16px"></div>

      </div>
    </main>
  </div>

  <style>
    @keyframes pulse {
      0%,100% { opacity:1 }
      50% { opacity:0.5 }
    }
  </style>
  <script src="../js/load-libs.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    async function init() {
      // Inject sidebar mark immediately
      const markEl = document.getElementById('sidebar-mark')
      if (markEl) markEl.innerHTML = pioneerMark('white', 22)

      // Auth check
      const user = await Auth.requireAuth()
      if (!user) return

      const isAdmin = Auth.isAdmin()

      // Render sidebar immediately after auth
      renderSidebar('dashboard.html', user)
      initMobileSidebar()

      // Render greeting immediately (no DB needed)
      const hour = new Date().getHours()
      const greeting = hour < 12 ? 'Buenos días' : hour < 18 ? 'Buenas tardes' : 'Buenas noches'
      const firstName = user.name.split(' ')[0]

      document.getElementById('skeleton-header').innerHTML = `
        <h1 class="page-title">${greeting}, ${firstName} 👋</h1>
        <p class="page-subtitle">${new Date().toLocaleDateString('es-DO', {
          weekday:'long', year:'numeric', month:'long', day:'numeric'
        })}</p>`

      // Render quick actions immediately
      document.getElementById('page-content').insertAdjacentHTML('beforeend', `
        <div class="grid-2" style="gap:16px;margin-top:20px" id="quick-actions">
          <a href="terceros-nuevo.html" class="quick-card">
            <div class="quick-card-icon" style="background:var(--purple-pale)">📄</div>
            <div>
              <p class="quick-card-title">Crear Tercero</p>
              <p class="quick-card-sub">Registrar nuevo proveedor o cliente</p>
            </div>
            <span style="margin-left:auto;color:var(--gray);font-size:20px">›</span>
          </a>
          ${isAdmin ? `
          <a href="usuarios.html" class="quick-card">
            <div class="quick-card-icon" style="background:#eff6ff">👥</div>
            <div>
              <p class="quick-card-title">Gestionar Usuarios</p>
              <p class="quick-card-sub">Crear cuentas y asignar roles</p>
            </div>
            <span style="margin-left:auto;color:var(--gray);font-size:20px">›</span>
          </a>` : ''}
        </div>`)

      // Now load DB data in background - update stats when ready
      loadStats(user, isAdmin)
      loadRecentData()
    }

    async function loadStats(user, isAdmin) {
      try {
        const sb = Auth.supabase
        const promises = [
          sb.from('tickets').select('*', { count: 'exact', head: true }).neq('status','Cerrado'),
          sb.from('terceros').select('*', { count: 'exact', head: true }),
        ]
        if (isAdmin) {
          promises.push(sb.from('users').select('*', { count: 'exact', head: true }).eq('is_active', true))
        }

        const results = await Promise.all(promises)
        const openTickets  = results[0].count || 0
        const totalTerceros = results[1].count || 0
        const totalUsers = isAdmin ? (results[2]?.count || 0) : null

        // Get this month count
        const thisMonth = new Date()
        thisMonth.setDate(1)
        thisMonth.setHours(0,0,0,0)
        const { count: monthCount } = await sb.from('terceros')
          .select('*', { count: 'exact', head: true })
          .gte('created_at', thisMonth.toISOString())

        document.getElementById('stats-grid').innerHTML = `
          <div class="card stat-card">
            <div class="stat-icon" style="background:#ede9fe">🎫</div>
            <div class="stat-value" style="color:var(--purple)">${openTickets}</div>
            <div class="stat-label">Tickets Abiertos</div>
          </div>
          <div class="card stat-card">
            <div class="stat-icon" style="background:var(--purple-pale)">📄</div>
            <div class="stat-value">${totalTerceros}</div>
            <div class="stat-label">Total Terceros</div>
          </div>
          ${isAdmin ? `
          <div class="card stat-card">
            <div class="stat-icon" style="background:#eff6ff">👥</div>
            <div class="stat-value" style="color:#2563eb">${totalUsers}</div>
            <div class="stat-label">Usuarios Activos</div>
          </div>` : ''}
          <div class="card stat-card">
            <div class="stat-icon" style="background:#f0fdf4">📈</div>
            <div class="stat-value" style="color:var(--green)">${monthCount || 0}</div>
            <div class="stat-label">Terceros Este Mes</div>
          </div>`
      } catch (e) {
        console.error('Stats error:', e)
        document.getElementById('stats-grid').innerHTML = `
          <div class="card stat-card">
            <div class="stat-icon" style="background:var(--purple-pale)">📄</div>
            <div class="stat-value">—</div>
            <div class="stat-label">Total Terceros</div>
          </div>`
      }
    }

    async function loadRecentData() {
      try {
        const sb = Auth.supabase

        // Replace the skeleton content area
        const existing = document.getElementById('data-grid')
        if (existing) existing.remove()

        const quickActions = document.getElementById('quick-actions')

        // Add data grid before quick actions
        const dataGrid = document.createElement('div')
        dataGrid.id = 'data-grid'
        dataGrid.className = 'grid-2'
        dataGrid.style.cssText = 'gap:20px;margin-bottom:20px'
        dataGrid.innerHTML = `
          <div class="card" style="animation:pulse 1.5s infinite;height:200px"></div>
          <div class="card" style="animation:pulse 1.5s infinite;height:200px"></div>`

        quickActions.parentNode.insertBefore(dataGrid, quickActions)

        // Remove skeleton placeholder
        const oldSkeleton = document.querySelector('[style*="height:300px"]')
        if (oldSkeleton) oldSkeleton.remove()

        const [{ data: recentTerceros }, { data: recentLogs }] = await Promise.all([
          sb.from('terceros').select('*').order('created_at', { ascending: false }).limit(5),
          sb.from('audit_logs').select('*, users(name)').order('created_at', { ascending: false }).limit(6),
        ])

        dataGrid.innerHTML = `
          <!-- Recent terceros -->
          <div class="card" style="overflow:hidden">
            <div class="card-header">
              <span class="card-title">Terceros Recientes</span>
              <a href="terceros-historial.html" class="btn btn-secondary btn-sm">Ver todos</a>
            </div>
            ${(recentTerceros||[]).length === 0
              ? '<div class="empty-state"><span>📋</span><p>No hay terceros aún</p></div>'
              : (recentTerceros||[]).map(t => `
                <div style="display:flex;align-items:start;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #f9f9f9">
                  <div style="min-width:0">
                    <p style="font-weight:600;font-size:13px;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">${t.nombre_razon}</p>
                    <p style="font-size:11px;color:var(--gray);margin-top:2px">RNC: ${t.rnc_cedula}</p>
                    <p style="font-size:11px;color:var(--gray)">Por: ${t.created_by_name||'—'}</p>
                  </div>
                  <div style="text-align:right;flex-shrink:0;margin-left:8px">
                    <span class="badge ${t.status==='activo'?'badge-active':'badge-inactive'}">${t.status}</span>
                    <p style="font-size:10px;color:var(--gray);margin-top:4px">${timeAgo(t.created_at)}</p>
                  </div>
                </div>`).join('')
            }
          </div>

          <!-- Activity feed -->
          <div class="card" style="overflow:hidden">
            <div class="card-header"><span class="card-title">🕐 Actividad Reciente</span></div>
            <div style="overflow-y:auto;max-height:280px">
              ${(recentLogs||[]).length === 0
                ? '<div class="empty-state"><span>📊</span><p>Sin actividad</p></div>'
                : (recentLogs||[]).map(log => `
                  <div style="display:flex;gap:10px;padding:11px 20px;border-bottom:1px solid #f9f9f9">
                    <div style="width:6px;height:6px;border-radius:50%;background:var(--purple);margin-top:5px;flex-shrink:0"></div>
                    <div>
                      <p style="font-size:12px;font-weight:600;color:#333">${getActionLabel(log.action)}</p>
                      <p style="font-size:11px;color:var(--gray)">${log.users?.name||'—'}</p>
                      <p style="font-size:10px;color:#ccc;margin-top:1px">${timeAgo(log.created_at)}</p>
                    </div>
                  </div>`).join('')
              }
            </div>
          </div>`

      } catch (e) {
        console.error('Recent data error:', e)
      }
    }

    function getActionLabel(a) {
      return {
        LOGIN:'Inicio de sesión', CREATE_TERCERO:'Tercero creado',
        EDIT_TERCERO:'Tercero editado', CREATE_USER:'Usuario creado',
        EDIT_USER:'Usuario editado', DEACTIVATE_USER:'Usuario desactivado',
        ACTIVATE_USER:'Usuario activado', CHANGE_ROLE:'Rol modificado'
      }[a] || a
    }

    init()
  </script>
</body>
</html>
